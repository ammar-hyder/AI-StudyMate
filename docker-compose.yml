services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-studymate-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - AWS_REGION=us-east-1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: ai-studymate-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
