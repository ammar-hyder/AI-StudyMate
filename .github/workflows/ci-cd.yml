name: AI StudyMate CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t ai-studymate-backend ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} -t ai-studymate-frontend ./frontend

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push backend image to ECR
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
        run: |
          docker tag ai-studymate-backend:latest $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:${{ github.sha }}
          docker tag ai-studymate-backend:latest $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:latest

      - name: Push frontend image to ECR
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_FRONTEND_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
        run: |
          docker tag ai-studymate-frontend:latest $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:${{ github.sha }}
          docker tag ai-studymate-frontend:latest $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:latest

      - name: Render backend ECS task definition
        if: github.event_name == 'push'
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          # ECS_TASK_DEFINITION should point to aws/ecs-task-definition.json or a downloaded production task definition.
          task-definition: ${{ secrets.ECS_TASK_DEFINITION }}
          container-name: ai-studymate-backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPOSITORY }}:${{ github.sha }}
          environment-variables: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            EMAIL_LAMBDA_FUNCTION_NAME=${{ secrets.EMAIL_LAMBDA_FUNCTION_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}

      - name: Deploy backend to ECS
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
